<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.vouched.id/plugin/releases/latest/index.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; box-sizing: border-box; background: transparent; }
    #vouched-element { height: 100%; width: 100%; }
  </style>
  <script type='text/javascript'>
    window.onload = function() {
      // Parse URL parameters for pre-filling verification data
      const urlParams = new URLSearchParams(window.location.search);
      const firstName = urlParams.get('firstName') || '';
      const lastName = urlParams.get('lastName') || '';
      const email = urlParams.get('email') || '';
      const phone = urlParams.get('phone') || '';
      const birthDate = urlParams.get('birthDate') || '';
      const uid = urlParams.get('uid') || '';
      const internalId = urlParams.get('internalId') || '';
      const context = urlParams.get('context') || 'consultation';
      const callbackURL = urlParams.get('callbackURL') || '';
      const appId = urlParams.get('appId') || 'sooD.0nmqW@uG7MIP*QLEkebheKqYk';

      function formatBirthDate(value) {
        const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!match) return value || undefined;
        return `${match[2]}/${match[3]}/${match[1]}`;
      }

      var vouched = Vouched({
        appId: appId,
        callbackURL: callbackURL || undefined,
        verification: {
          firstName: firstName,
          lastName: lastName,
          email: email,
          phone: phone,
          birthDate: formatBirthDate(birthDate),
          internalId: internalId || undefined
        },
        properties: [
          { name: 'firebaseUid', value: uid },
          { name: 'internalId', value: internalId },
          { name: 'role', value: 'patient' }
        ],
        liveness: 'enhanced',
        id: 'camera',
        idLiveness: 'distance',
        includeBarcode: true,
        manualCaptureTimeout: 20000,
        maxRetriesBeforeNext: 3,
        numForceRetries: 3,
        showTermsAndPrivacy: true,
        crossDevice: true,
        crossDeviceQRCode: true,
        crossDeviceSMS: true,
        theme: {
          name: 'avant',
        },
        onDone: (job) => {
          console.log("Scanning complete", { token: job.token, result: job.result });
          
          // Send message to parent window (React)
          window.parent.postMessage({
            type: 'VOUCHED_DONE',
            context: context,
            success: job.result ? job.result.success : false,
            jobId: job.id || job.token,
            internalId: internalId
          }, "*");
        }
      });
      vouched.mount("#vouched-element");
    };
  </script>

</script>
</head>
<body>
  <div id='vouched-element'></div>
</body>
</html>
