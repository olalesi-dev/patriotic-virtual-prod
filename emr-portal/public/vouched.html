<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.vouched.id/plugin/releases/latest/index.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; box-sizing: border-box; background: #ffffff; }
    #vouched-element { height: 100%; width: 100%; background: #ffffff; }
    #vouched-error {
      display: none;
      height: 100%;
      width: 100%;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #334155;
      font-family: Arial, sans-serif;
      padding: 24px;
      background: #ffffff;
    }
  </style>
  <script type='text/javascript'>
    window.onload = function() {
      const showError = function(message) {
        const errorNode = document.getElementById('vouched-error');
        const mountNode = document.getElementById('vouched-element');
        if (mountNode) mountNode.style.display = 'none';
        if (errorNode) {
          errorNode.textContent = message;
          errorNode.style.display = 'flex';
        }
      };

      // Parse URL parameters for pre-filling verification data
      const urlParams = new URLSearchParams(window.location.search);
      const firstName = urlParams.get('firstName') || '';
      const lastName = urlParams.get('lastName') || '';
      const email = urlParams.get('email') || '';
      const phone = urlParams.get('phone') || '';

      if (typeof Vouched !== 'function') {
        showError('Identity verification could not start because the Vouched SDK did not load.');
        return;
      }

      try {
        var vouched = Vouched({
          appId: 'EmbGg*-Iph.xlzsx8fX9_O!BouHbdS',
          verification: {
            firstName: firstName,
            lastName: lastName,
            email: email,
            phone: phone
          },
          liveness: 'enhanced',
          id: 'camera',
          includeBarcode: true,
          manualCaptureTimeout: 20000,
          showTermsAndPrivacy: true,
          crossDevice: true,
          crossDeviceQRCode: true,
          crossDeviceSMS: true,
          theme: {
            name: 'avant',
          },
          onDone: (job) => {
            console.log("Scanning complete", { token: job.token, result: job.result });
            
            // Send message to parent window (React)
            window.parent.postMessage({
              type: 'VOUCHED_DONE',
              success: job.result ? job.result.success : false,
              jobId: job.id || job.token
            }, "*");
          }
        });
        vouched.mount("#vouched-element");
      } catch (error) {
        console.error('Vouched mount failed', error);
        showError('Identity verification could not start. Please refresh and try again.');
      }
    };
  </script>
</head>
<body>
  <div id='vouched-element'></div>
  <div id='vouched-error'></div>
</body>
</html>
