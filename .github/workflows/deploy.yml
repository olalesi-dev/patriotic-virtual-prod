name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure npm for retries
        run: |
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set prefer-online true

      - name: Install root dependencies
        run: npm ci
        env:
          npm_config_prefer_online: true

      - name: Install EMR portal dependencies
        run: npm ci
        working-directory: emr-portal
        env:
          npm_config_prefer_online: true

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATRIOTIC_VIRTUAL_PROD }}'

      - name: Deploy Firestore Rules and Indexes
        run: npx firebase-tools deploy --only firestore --project patriotic-virtual-prod --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: '${{ steps.auth.outputs.credentials_file_path }}'

      - name: Pre-install global dependencies
        run: npm install -g firebase-tools esbuild

      - name: Validate EMR frontend public env
        run: |
          node - <<'NODE'
          const apiUrl = (process.env.NEXT_PUBLIC_API_URL || '').trim();
          const appUrl = (process.env.NEXT_PUBLIC_APP_URL || '').trim();

          function assertAbsoluteHttps(name, value) {
            if (!value) {
              throw new Error(`${name} is missing`);
            }

            let url;
            try {
              url = new URL(value);
            } catch {
              throw new Error(`${name} must be an absolute URL, got: ${value}`);
            }

            if (url.protocol !== 'https:') {
              throw new Error(`${name} must use https in production, got: ${value}`);
            }

            if (url.hostname === 'localhost' || url.hostname === '127.0.0.1') {
              throw new Error(`${name} must not point to localhost in production, got: ${value}`);
            }
          }

          assertAbsoluteHttps('NEXT_PUBLIC_API_URL', apiUrl);
          assertAbsoluteHttps('NEXT_PUBLIC_APP_URL', appUrl);
          NODE
        env:
          NEXT_PUBLIC_API_URL: '${{ secrets.NEXT_PUBLIC_API_URL }}'
          NEXT_PUBLIC_APP_URL: '${{ secrets.NEXT_PUBLIC_APP_URL }}'

      - name: Deploy to Firebase EMR
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATRIOTIC_VIRTUAL_PROD }}'
          channelId: live
          projectId: patriotic-virtual-prod
          target: emr
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          NEXT_PUBLIC_FIREBASE_API_KEY: '${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}'
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: '${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: '${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}'
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: '${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}'
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}'
          NEXT_PUBLIC_FIREBASE_APP_ID: '${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}'
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: '${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}'
          NEXT_PUBLIC_API_URL: '${{ secrets.NEXT_PUBLIC_API_URL }}'
          NEXT_PUBLIC_DOSESPOT_BACKEND_URL: '${{ secrets.NEXT_PUBLIC_DOSESPOT_BACKEND_URL }}'
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: '${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}'
          STRIPE_SECRET_KEY: '${{ secrets.STRIPE_SECRET_KEY }}'
          NEXT_PUBLIC_APP_URL: '${{ secrets.NEXT_PUBLIC_APP_URL }}'
          DOSESPOT_BACKEND_URL: '${{ secrets.DOSESPOT_BACKEND_URL }}'
          NEXT_PUBLIC_VOUCHED_PUBLIC_KEY: '${{ secrets.NEXT_PUBLIC_VOUCHED_PUBLIC_KEY }}'
          NEXT_PUBLIC_VOUCHED_WEBHOOK_ORIGIN: '${{ secrets.NEXT_PUBLIC_VOUCHED_WEBHOOK_ORIGIN }}'


      - name: Deploy to Firebase Landing
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATRIOTIC_VIRTUAL_PROD }}'
          channelId: live
          projectId: patriotic-virtual-prod
          target: landing
