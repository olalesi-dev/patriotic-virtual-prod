name: Deploy to Firebase Hosting on merge
on:
  push:
      branches:
            - main

            jobs:
              build_and_deploy:
                  runs-on: ubuntu-latest
                      steps:
                            - uses: actions/checkout@v4

                                  - name: Setup Node.js
                                          uses: actions/setup-node@v4
                                                  with:
                                                            node-version: '22'

                                                                  - name: Install Dependencies
                                                                          run: |
                                                                                    npm ci
                                                                                              cd emr-portal && npm ci

                                                                                                    - name: Authenticate to Google Cloud
                                                                                                            id: auth
                                                                                                                    uses: google-github-actions/auth@v2
                                                                                                                            with:
                                                                                                                                      credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATRIOTIC_VIRTUAL_PROD }}'
                                                                                                                                      
                                                                                                                                            - name: Deploy Firestore Rules and Indexes
                                                                                                                                                    run: npx firebase-tools deploy --only firestore --project patriotic-virtual-prod --non-interactive
                                                                                                                                                            env:
                                                                                                                                                                      GOOGLE_APPLICATION_CREDENTIALS: '${{ steps.auth.outputs.credentials_file_path }}'
                                                                                                                                                                      
                                                                                                                                                                            - name: Deploy to Firebase EMR
                                                                                                                                                                                    uses: FirebaseExtended/action-hosting-deploy@v0
                                                                                                                                                                                            with:
                                                                                                                                                                                                      repoToken: '${{ secrets.GITHUB_TOKEN }}'
                                                                                                                                                                                                                firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATRIOTIC_VIRTUAL_PROD }}'
                                                                                                                                                                                                                          channelId: live
                                                                                                                                                                                                                                    projectId: patriotic-virtual-prod
                                                                                                                                                                                                                                              target: emr
                                                                                                                                                                                                                                                      env:
                                                                                                                                                                                                                                                                FIREBASE_CLI_EXPERIMENTS: webframeworks
                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                      - name: Deploy to Firebase Landing
                                                                                                                                                                                                                                                                              uses: FirebaseExtended/action-hosting-deploy@v0
                                                                                                                                                                                                                                                                                      with:
                                                                                                                                                                                                                                                                                                repoToken: '${{ secrets.GITHUB_TOKEN }}'
                                                                                                                                                                                                                                                                                                          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATRIOTIC_VIRTUAL_PROD }}'
                                                                                                                                                                                                                                                                                                                    channelId: live
                                                                                                                                                                                                                                                                                                                              projectId: patriotic-virtual-prod
                                                                                                                                                                                                                                                                                                                                        target: landing
                                                                                                                                                                                                                                                                                                                                        
